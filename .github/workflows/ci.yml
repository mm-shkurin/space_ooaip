name: .NET

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test with coverage
        run: |
          dotnet test --no-build --configuration Release \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=cobertura \
          /p:CoverletOutput=coverage.xml

      - name: Extract coverage
        id: coverage
        run: |
          COVERAGE=$(grep -oPm1 '(?<=line-rate=")[^"]*' coverage.xml)
          PERCENT=$(echo "$COVERAGE * 100" | bc | cut -d'.' -f1)
          echo "coverage=$PERCENT" >> $GITHUB_OUTPUT

      - name: Coverage < 90%
        run: |
          if [ ${{ steps.coverage.outputs.coverage }} -lt 90 ]; then
            echo "Coverage is below 90%"
            exit 1
          fi

      - name: Comment coverage
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = "${{ steps.coverage.outputs.coverage }}";
            const body = `Test Coverage: **${coverage}%**`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
