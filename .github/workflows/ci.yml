name: .NET

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Check formatting
        run: dotnet format --verify-no-changes

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test with coverage
        id: test
        run: dotnet test --no-build --collect:"XPlat Code Coverage"

      - name: Install ReportGenerator
        run: dotnet tool install -g reportgenerator --version 5.3.8

      - name: Generate coverage report
        run: |
          reportgenerator \
          -reports:"coverage/**/coverage.cobertura.xml" \
          -targetdir:"coveragereport" \
          -reporttypes:"HtmlInline;MarkdownSummaryGithub"

      - name: Extract coverage percentage
        id: coverage-percentage
        run: |
          # Extract coverage percentage from Summary.md
          COVERAGE_PERCENTAGE=$(grep -oP 'Line coverage: \K[0-9.]+(?=%)' coveragereport/Summary.md | head -1)
          
          if [ -z "$COVERAGE_PERCENTAGE" ]; then
            COVERAGE_PERCENTAGE=0
          fi
          
          echo "coverage=$COVERAGE_PERCENTAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE_PERCENTAGE%"

      - name: Check coverage threshold
        run: |
          COVERAGE=${{ steps.coverage-percentage.outputs.coverage }}
          THRESHOLD=90
          
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "Coverage is $COVERAGE%, which is below the required $THRESHOLD%"
            exit 1
          else
            echo "Coverage is $COVERAGE%, satisfies the coverage condition (> $THRESHOLD%)"
          fi

      - name: Comment PR with coverage report
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: coverage-report
          message: |
            Code Coverage Report
            
            Line Coverage: ${{ steps.coverage-percentage.outputs.coverage }}%
            Threshold Required: 90%
            Status: ${{ steps.coverage-percentage.outputs.coverage > 90 && 'PASSED' || 'FAILED' }}
            
            ${{ steps.coverage-percentage.outputs.coverage > 90 && 'This PR meets the coverage requirement!' || 'This PR does NOT meet the 90% coverage requirement! Please add more tests!' }}
            